syntax = "proto3";

package luna.replication.v1;

option go_package = "github.com/jabberwocky238/luna-edge/replication/replpb;replpb";

import "google/protobuf/timestamp.proto";

message Snapshot {
  string node_id = 1;
  google.protobuf.Timestamp created_at = 2;
  repeated DNSRecord dns_records = 3;
  repeated DomainEntryProjection domain_entries = 4;
  uint64 snapshot_record_id = 5;
  bool last = 6;
}

message SnapshotRequest {
  string node_id = 1;
  uint64 snapshot_record_id = 2;
}

message SubscriptionRequest {
  string node_id = 1;
}

message ChangeNotification {
  string node_id = 1;
  google.protobuf.Timestamp created_at = 2;
  uint64 snapshot_record_id = 3;
  oneof entry {
    DNSRecord dns_record = 4;
    DomainEntryProjection domain_entry = 5;
  }
}

message CertificateBundleRequest {
  string hostname = 1;
  uint64 revision = 2;
}

message CertificateBundleResponse {
  string hostname = 1;
  uint64 revision = 2;
  bytes tls_crt = 3;
  bytes tls_key = 4;
  bytes metadata_json = 5;
}

message DNSRecord {
  string id = 1;
  string fqdn = 2;
  string record_type = 3;
  string routing_class = 4;
  uint32 ttl_seconds = 5;
  string values_json = 6;
  string routing_key = 7;
  bool enabled = 8;
  bool deleted = 9;
}

message ServiceBackendRef {
  string id = 1;
  string service_namespace = 2;
  string service_name = 3;
  uint32 service_port = 4;
}

message HTTPRouteProjection {
  string id = 1;
  string domain_endpoint_id = 2;
  string hostname = 3;
  string path = 4;
  int32 priority = 5;
  ServiceBackendRef backend_ref = 6;
}

message CertificateRevision {
  string id = 1;
  string domain_endpoint_id = 2;
  string hostname = 3;
  uint64 revision = 4;
  string provider = 5;
  string challenge_type = 6;
  string artifact_bucket = 7;
  string artifact_prefix = 8;
  string sha256_crt = 9;
  string sha256_key = 10;
  google.protobuf.Timestamp not_before = 11;
  google.protobuf.Timestamp not_after = 12;
}

message DomainEntryProjection {
  string id = 1;
  string hostname = 2;
  string backend_type = 3;
  CertificateRevision cert = 4;
  repeated HTTPRouteProjection http_routes = 5;
  ServiceBackendRef binded_backend_ref = 6;
  bool deleted = 7;
}

service ReplicationService {
  rpc GetSnapshot(SnapshotRequest) returns (stream Snapshot);
  rpc Subscribe(SubscriptionRequest) returns (stream ChangeNotification);
  rpc FetchCertificateBundle(CertificateBundleRequest) returns (CertificateBundleResponse);
}
