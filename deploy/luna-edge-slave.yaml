apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: luna-edge
  namespace: luna-edge
spec:
  gatewayClassName: luna-edge
  listeners:
    - name: web
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: websecure
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: luna-edge-bootstrap-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: luna-edge-slave
  namespace: luna-edge
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: luna-edge-slave
  namespace: luna-edge
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - httproutes
      - grpcroutes
      - tlsroutes
      - tcproutes
      - udproutes
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: luna-edge-slave
  namespace: luna-edge
subjects:
  - kind: ServiceAccount
    name: luna-edge-slave
    namespace: luna-edge
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: luna-edge-slave
---
apiVersion: v1
kind: Service
metadata:
  name: luna-edge
  namespace: luna-edge
spec:
  type: ClusterIP
  selector:
    app: luna-slave
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: luna-slave
  namespace: luna-edge
spec:
  selector:
    matchLabels:
      app: luna-slave
  template:
    metadata:
      labels:
        app: luna-slave
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: luna-edge-slave
      initContainers:
        - name: prepare-geoip-mmdb
          image: curlimages/curl:8.12.1
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -ec
            - |
              mkdir -p /var/lib/luna/geoip
              if [ -s /var/lib/luna/geoip/GeoLite2-City.mmdb ]; then
                exit 0
              fi
              curl -fsSL "${GEOIP_CITY_MMDB_URL}" -o /var/lib/luna/geoip/GeoLite2-City.mmdb.tmp
              mv /var/lib/luna/geoip/GeoLite2-City.mmdb.tmp /var/lib/luna/geoip/GeoLite2-City.mmdb
          env:
            - name: GEOIP_CITY_MMDB_URL
              valueFrom:
                configMapKeyRef:
                  name: luna-edge-slave-config
                  key: GEOIP_CITY_MMDB_URL
          volumeMounts:
            - name: data
              mountPath: /var/lib/luna
      containers:
        - name: slave
          image: ghcr.io/jabberwocky238/luna-edge:latest
          imagePullPolicy: Always
          command: ["slave"]
          envFrom:
            - configMapRef:
                name: luna-edge-slave-config
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: health
              containerPort: 50050
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
          startupProbe:
            tcpSocket:
              host: 127.0.0.1
              port: 50050
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              host: 127.0.0.1
              path: /healthz
              port: 50050
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            tcpSocket:
              host: 127.0.0.1
              port: 50050
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/luna
      volumes:
        - name: data
          hostPath:
            path: /data/luna-edge
            type: DirectoryOrCreate
