apiVersion: v1
kind: ConfigMap
metadata:
  name: luna-edge-slave-config
  namespace: luna-edge
data:
  LUNA_MASTER_ADDRESS: "luna-master.luna-edge.svc.cluster.local:50051"
  LUNA_MASTER_MANAGE_URL: "http://luna-master.luna-edge.svc.cluster.local:8080"
  LUNA_RETRY_MIN_BACKOFF: "1s"
  LUNA_RETRY_MAX_BACKOFF: "30s"
  LUNA_DNS_LISTEN: ":53"
  LUNA_DNS_FORWARD_ENABLED: "0"
  LUNA_DNS_FORWARD_SERVERS: "1.1.1.1:53"
  LUNA_DNS_FORWARD_TIMEOUT: "5s"
  LUNA_DNS_GEOIP_ENABLED: "1"
  LUNA_DNS_GEOIP_MMDB_PATH: "/var/lib/luna/geoip/GeoLite2-City.mmdb"
  GEOIP_CITY_MMDB_URL: "http://cdnus.enzyme.jw238.site/GeoLite2-City.mmdb"
  LUNA_HEALTH_LISTEN: ":50050"
  LUNA_INGRESS_K8S_NAMESPACE: "luna-edge"
  LUNA_INGRESS_K8S_CLASS: "luna-edge"
  LUNA_CACHE_ROOT: "/var/lib/luna"
---
