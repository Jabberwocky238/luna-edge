apiVersion: v1
kind: Namespace
metadata:
  name: luna-edge
  labels:
    luna-edge.io/topology: cilium-mesh-core
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: luna-edge-master-config
  namespace: luna-edge
data:
  LUNA_CLUSTER_NAME: "core"
  LUNA_REPLICATION_LISTEN: ":50051"
  LUNA_MANAGE_LISTEN: ":8080"
  LUNA_AUTO_MIGRATE: "1"
  LUNA_S3_ENDPOINT: "http://minio.minio.svc.cluster.local:9000"
  LUNA_S3_REGION: "us-east-1"
  LUNA_S3_PATH_STYLE: "1"
  LUNA_S3_INSECURE_SKIP_VERIFY: "0"
  LUNA_S3_HTTP_TIMEOUT: "10s"
---
apiVersion: v1
kind: Secret
metadata:
  name: luna-edge-master-secrets
  namespace: luna-edge
type: Opaque
stringData:
  LUNA_POSTGRES_DSN: "postgres://luna:luna@postgres.default.svc.cluster.local:5432/luna?sslmode=disable"
  LUNA_S3_ACCESS_KEY_ID: "replace-me"
  LUNA_S3_SECRET_ACCESS_KEY: "replace-me"
  LUNA_S3_SESSION_TOKEN: ""
---
apiVersion: v1
kind: Service
metadata:
  name: luna-master
  namespace: luna-edge
spec:
  selector:
    app: luna-master
    luna-edge.io/cluster: core
  ports:
    - name: manage
      port: 8080
      targetPort: 8080
    - name: replication
      port: 50051
      targetPort: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: luna-master
  namespace: luna-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: luna-master
      luna-edge.io/cluster: core
  template:
    metadata:
      labels:
        app: luna-master
        luna-edge.io/cluster: core
    spec:
      containers:
        - name: master
          image: ghcr.io/jabberwocky238/luna-edge:latest
          imagePullPolicy: IfNotPresent
          command: ["master"]
          envFrom:
            - configMapRef:
                name: luna-edge-master-config
            - secretRef:
                name: luna-edge-master-secrets
          ports:
            - name: manage
              containerPort: 8080
            - name: replication
              containerPort: 50051
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
