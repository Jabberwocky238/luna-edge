apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dnsdomainrecords.luna-edge.io
spec:
  group: luna-edge.io
  scope: Namespaced
  names:
    plural: dnsdomainrecords
    singular: dnsdomainrecord
    kind: DnsDomainRecord
    listKind: DnsDomainRecordList
    shortNames:
      - ddr
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - domain
                - records
              properties:
                domain:
                  type: string
                  minLength: 1
                  description: Fully qualified domain name managed by this resource.
                records:
                  type: array
                  minItems: 1
                  description: DNS records attached to the domain.
                  items:
                    type: object
                    required:
                      - type
                      - values
                    properties:
                      name:
                        type: string
                        description: Relative record name. Use "@" or empty for the root domain.
                      type:
                        type: string
                        minLength: 1
                        description: DNS record type such as A, AAAA, CNAME, TXT, MX, NS, SRV, or CAA.
                      ttl:
                        type: integer
                        format: int32
                        minimum: 0
                        description: Record TTL in seconds.
                      values:
                        type: array
                        minItems: 1
                        description: Record values. For multi-value records, include multiple entries.
                        items:
                          type: string
                          minLength: 1
                      comment:
                        type: string
                        description: Optional human-readable note for operators.
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                syncedAt:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Domain
          type: string
          jsonPath: .spec.domain
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
