apiVersion: v1
kind: ConfigMap
metadata:
  name: luna-edge-panel-config
  namespace: luna-edge
data:
  LUNA_EDGE_PANEL_ADDR: "0.0.0.0:18090"
  LUNA_MASTER_URL: "http://luna-master.luna-edge.svc.cluster.local:8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: luna-edge-panel
  namespace: luna-edge
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: luna-edge-panel
  template:
    metadata:
      labels:
        app: luna-edge-panel
    spec:
      containers:
        - name: panel
          image: ghcr.io/jabberwocky238/luna-edge-panel:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 18090
          envFrom:
            - configMapRef:
                name: luna-edge-panel-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: luna-edge-panel
  namespace: luna-edge
spec:
  selector:
    app: luna-edge-panel
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: luna-edge-panel
  namespace: luna-edge
spec:
  parentRefs:
    - name: luna-edge-panel
      sectionName: web
    - name: luna-edge-panel
      sectionName: websecure
  hostnames:
    - luna-edge.app238.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: luna-edge-panel
          port: 80
