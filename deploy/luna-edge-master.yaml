apiVersion: v1
kind: ConfigMap
metadata:
  name: luna-edge-master-config
  namespace: luna-edge
data:
  LUNA_REPLICATION_LISTEN: ":50051"
  LUNA_MANAGE_LISTEN: ":8080"
  LUNA_AUTO_MIGRATE: "1"
  LUNA_K8S_BRIDGE_ENABLED: "1"
  LUNA_K8S_NAMESPACE: "luna-edge"
  LUNA_K8S_INGRESS_CLASS: "luna-edge"
  LUNA_ACME_DEFAULT_PROVIDER: "zerossl"
  LUNA_ACME_DEFAULT_EMAIL: ""
  LUNA_ACME_EAB_KID: ""
  LUNA_S3_ENDPOINT: "http://minio.default.svc.cluster.local:9000"
  LUNA_S3_BUCKET: "lunaedge"
  LUNA_S3_INSECURE_SKIP_VERIFY: "0"
  LUNA_S3_HTTP_TIMEOUT: "10s"
---
apiVersion: v1
kind: Secret
metadata:
  name: luna-edge-master-secrets
  namespace: luna-edge
type: Opaque
stringData:
  LUNA_POSTGRES_DSN: "postgres://lunaedge:lunaedge@postgres.default.svc.cluster.local:5432/lunaedge?sslmode=disable"
  LUNA_ACME_EAB_HMAC_KEY: ""
  LUNA_S3_ACCESS_KEY_ID: "lunaedge"
  LUNA_S3_SECRET_ACCESS_KEY: "lunaedge"
  LUNA_S3_SESSION_TOKEN: ""
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: luna-edge-master
  namespace: luna-edge
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: luna-edge-master
  namespace: luna-edge
rules:
  - apiGroups: ["luna-edge.io"]
    resources: ["dnsdomainrecords"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - httproutes
      - grpcroutes
      - tlsroutes
      - tcproutes
      - udproutes
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: luna-edge-master
  namespace: luna-edge
subjects:
  - kind: ServiceAccount
    name: luna-edge-master
    namespace: luna-edge
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: luna-edge-master
---
apiVersion: v1
kind: Service
metadata:
  name: luna-master
  namespace: luna-edge
spec:
  selector:
    app: luna-master
  ports:
    - name: manage
      port: 8080
      targetPort: 8080
    - name: replication
      port: 50051
      targetPort: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: luna-master
  namespace: luna-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: luna-master
  template:
    metadata:
      labels:
        app: luna-master
    spec:
      serviceAccountName: luna-edge-master
      containers:
        - name: master
          image: ghcr.io/jabberwocky238/luna-edge:latest
          imagePullPolicy: Always
          command: ["master"]
          envFrom:
            - configMapRef:
                name: luna-edge-master-config
            - secretRef:
                name: luna-edge-master-secrets
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: manage
              containerPort: 8080
            - name: replication
              containerPort: 50051
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
