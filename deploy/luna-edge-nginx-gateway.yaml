apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-html
  namespace: luna-edge
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Luna Edge Gateway</title>
      <style>
        :root {
          color-scheme: light;
          --bg: #e8f6f2;
          --panel: #f7fffd;
          --ink: #0f172a;
          --accent: #0f766e;
          --accent-2: #155e75;
        }
        * { box-sizing: border-box; }
        body {
          margin: 0;
          min-height: 100vh;
          display: grid;
          place-items: center;
          background:
            radial-gradient(circle at top right, rgba(15,118,110,0.18), transparent 30rem),
            linear-gradient(160deg, var(--bg), #dff3ee 52%, #d4ebe5);
          color: var(--ink);
          font-family: "Trebuchet MS", Verdana, sans-serif;
        }
        .card {
          width: min(44rem, calc(100vw - 2rem));
          padding: 2.5rem;
          border: 1px solid rgba(15,23,42,0.08);
          border-radius: 1.5rem;
          background: rgba(247, 255, 253, 0.94);
          box-shadow: 0 1.5rem 4rem rgba(15,23,42,0.12);
        }
        .eyebrow {
          margin: 0 0 1rem;
          font-size: 0.8rem;
          letter-spacing: 0.18em;
          text-transform: uppercase;
          color: var(--accent);
        }
        h1 {
          margin: 0;
          font-size: clamp(2.4rem, 6vw, 4.8rem);
          line-height: 0.95;
        }
        p {
          margin: 1.25rem 0 0;
          max-width: 36rem;
          font-size: 1.05rem;
          line-height: 1.7;
        }
        .badge {
          display: inline-block;
          margin-top: 1.5rem;
          padding: 0.45rem 0.75rem;
          border-radius: 999px;
          background: var(--accent-2);
          color: #ecfeff;
          font-size: 0.85rem;
          letter-spacing: 0.08em;
          text-transform: uppercase;
        }
      </style>
    </head>
    <body>
      <main class="card">
        <p class="eyebrow">Luna Edge</p>
        <h1>Gateway Route Active</h1>
        <p>
          This page is served by the dedicated <strong>Gateway API</strong> test workload.
          If you can see this, the request matched the HTTPRoute adaptation path instead of classic Ingress compatibility.
        </p>
        <span class="badge">nginx-gateway</span>
      </main>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: luna-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      volumes:
        - name: custom-html
          configMap:
            name: nginx-gateway-html
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: custom-html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: luna-edge
spec:
  selector:
    app: nginx-gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-gateway
  namespace: luna-edge
spec:
  parentRefs:
    - name: luna-edge
      sectionName: web
    - name: luna-edge
      sectionName: websecure
  hostnames:
    - nginx-gateway.cluster-1.app238.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nginx-gateway
          port: 80
